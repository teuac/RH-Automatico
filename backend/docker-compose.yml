version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rh_presenca_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rh_presenca
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: rh_presenca_web
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/rh_presenca
    depends_on:
      - db

volumes:
  postgres_data:
